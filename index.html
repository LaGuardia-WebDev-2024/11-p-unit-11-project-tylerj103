<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Animal #1</button>
    <button id="mem2-button">Animal #2</button>
    <button id="mem3-button">Animal #3</button>
    <h1>My Top 3 Animals <span>That Are Adorable</span></h1>
    <ol>
      <li>
        <h3 id="mem1">Memory #1</h3>
        <p>More about this memory.</p>
        <img class="mem3" src="https://ogden_images.s3.amazonaws.com/www.iamcountryside.com/images/sites/2/2022/02/13131252/AdobeStock_74466779-scaled-e1675118602223.jpeg" 
        width="300">
      </li>

      <li>
        <h3 id="mem2">Memory #2</h3>
        <p>More about this memory.</p>
         <img class="mem3" src="https://www.stancsmith.com/uploads/4/8/9/6/48964465/ab55ea58cf68ad840fe55bcda3c4a9ce30cd97f2_orig.jpg" 
        width="300">
      </li>

      <li>
        <h3 id="mem3">Memory #3</h3>
        <p>More about this memory</p>
        <img class="mem3" src="https://www.colchesterzoologicalsociety.com/wp-content/uploads/2024/09/Red-Panda-7.jpg" 
        width="300">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
          $("#mem1").text("Baby Goat");
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
        $("#mem2").text("Quokka");
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
        $("#mem3").text("Red Panda");
        $("Animal#3").show(2000)
      });


    </script>
  </body>
</html>
